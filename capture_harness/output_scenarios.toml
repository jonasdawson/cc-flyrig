# OutputScenario schema
# Required fields: id, description, prompt, target_event, fixture_decision, probe_event,
#                  assertion_type, [[scenarios.fields]]
# Optional fields:
#   permission_mode   str   "bypassPermissions" | "default" | "auto"  (default: bypassPermissions)
#   timeout_s         float seconds before the session is killed        (default: 60)
#   canary            str   string that must appear in pane for pane-contains assertions
#   followup_prompt   str   second prompt sent after first Stop
#   followup_action   str   "write-watched-path" — write watched_path after Stop
#   watched_path      str   absolute path to write for write-watched-path action
#   model             str   --model alias (e.g. "sonnet"); required for auto permission_mode
#   mcp_server        str   registry key from capture_harness/servers/ (e.g. "elicit-probe")
#   assertion_path    str   absolute path checked by filesystem assertion
#   fixture_exit_code int   exit code for decision_fixture.py (default: 0)
#   note              str   stored in manifest when result is unobservable

[[scenarios]]
id = "pretooluse-deny"
description = "PreToolUse deny: tool call blocked; PostToolUse absent"
prompt = "Use the Read tool to read /etc/hostname. Do not do anything else."
permission_mode = "bypassPermissions"
target_event = "PreToolUse"
fixture_decision = '{"hookSpecificOutput": {"hookEventName": "PreToolUse", "permissionDecision": "deny"}}'
probe_event = "PostToolUse"
assertion_type = "spool-absent"
timeout_s = 60

[[scenarios.fields]]
field = "hookSpecificOutput.permissionDecision"
variant = "deny"

[[scenarios]]
id = "pretooluse-additionalcontext"
description = "PreToolUse additionalContext: canary injected; model recall checked via follow-up"
prompt = "Use the Read tool to read /etc/hostname. Do not do anything else."
permission_mode = "bypassPermissions"
target_event = "PreToolUse"
fixture_decision = '{"hookSpecificOutput": {"hookEventName": "PreToolUse", "additionalContext": "CANARY_FLYRIG_7f3a"}}'
probe_event = "Stop"
assertion_type = "pane-contains"
canary = "CANARY_FLYRIG_7f3a"
followup_prompt = "What additional context did you receive before the tool ran? Quote it exactly if you received any."
timeout_s = 90
note = "canary absent from model follow-up; model may have received context without echoing it verbatim"

[[scenarios.fields]]
field = "hookSpecificOutput.additionalContext"

