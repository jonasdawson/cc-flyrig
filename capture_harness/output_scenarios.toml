assertion_type = "pane-contains"
canary = "Denied by PermissionRequest hook"
timeout_s = 60
note = "CC 2.1.183: PermissionDenied event does not fire for hook-based denials; pane-contains used instead"

[[scenarios.fields]]
field = "hookSpecificOutput.decision.behavior"
variant = "deny"

