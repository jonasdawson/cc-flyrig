# Capture battery for the cc-flyrig.
#
# Each [[scenario]] is one `claude` run the orchestrator drives (interactive, via tmux) to make hook
# events fire so their real stdin payloads can be captured. Fields are grouped by concern:
# [scenario.expect] (events/tools the run should surface + how it is reached), [scenario.launch]
# (model, permission mode, CLI flags), [scenario.setup] (sandbox files, env), [scenario.drive]
# (interactions, completion, timeout), and [scenario.environment_plugins] (opt-in capture mechanisms; see
# capabilities.py). expect.events drives the coverage matrix and the orchestrator's retry-on-miss:
# every expected event should be observed, and any that is not is reported as expected-but-missing
# (e.g. WorktreeRemove, a tracked CC bug — see that scenario).

[meta]
description = "CC hooks capture battery (cc-2.1.177)"
# P6: battery-wide defaults — Haiku 4.5 + low effort (cheap/fast); orchestration-heavy scenarios
# override launch.model = "sonnet". Haiku's 200k window also enables the PostCompact auto-compaction
# path.
default_model = "haiku"
default_effort = "low"

[run.settings.standard]
# P7: WorktreeCreate requires a stdout-printing shim — a passive probe would break worktree
# creation. worktree_probe.py satisfies the path-print requirement; all other events use probe.py.
default_script = "probe.py"
[run.settings.standard.script_overrides]
WorktreeCreate = "worktree_probe.py"
[run.settings.standard.matchers]
# P5: FileChanged requires a matcher; watched.txt is the watch target seeded in each sandbox.
FileChanged = "watched.txt"

[run.settings.native]
# P9: used by git_repo scenarios where CC manages WorktreeCreate natively (causes WorktreeRemove
# to fire on subagent teardown). WorktreeCreate excluded so CC uses its own git worktree machinery.
default_script = "probe.py"
exclude_events = ["WorktreeCreate"]
[run.settings.native.matchers]
FileChanged = "watched.txt"

